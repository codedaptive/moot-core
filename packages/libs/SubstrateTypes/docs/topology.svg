<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <style>
    .box   { fill: #ffffff; stroke: #333; stroke-width: 1.5; }
    .label { font-size: 13px; fill: #111; }
    .sub   { font-size: 10.5px; fill: #555; }
    .flow  { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .derive{ stroke: #888; stroke-width: 1.2; fill: none; marker-end: url(#arrow); stroke-dasharray: 5 3; opacity: 0.65; }
    .region { fill: none; stroke: #999; stroke-width: 1.2; stroke-dasharray: 7 4; }
    .regionlabel { font-size: 11px; fill: #777; font-style: italic; }
  </style>

  <!-- Title -->
  <text x="20" y="28" font-size="15" font-weight="bold" fill="#111">SubstrateTypes: row shape, coordinates, and the views derived from them</text>

  <!-- Row 1: fingerprint construction + algebra -->
  <rect class="box" x="20" y="60" width="150" height="54" rx="6"/>
  <text class="label" x="95" y="82" text-anchor="middle">HyperplaneFamily</text>
  <text class="sub" x="95" y="98" text-anchor="middle">64 fixed ±1 planes</text>

  <rect class="box" x="200" y="60" width="110" height="54" rx="6"/>
  <text class="label" x="255" y="82" text-anchor="middle">SimHash</text>
  <text class="sub" x="255" y="98" text-anchor="middle">sign(&lt;v,h&gt;) per block</text>

  <rect class="box" x="340" y="60" width="140" height="54" rx="6"/>
  <text class="label" x="410" y="82" text-anchor="middle">Fingerprint256</text>
  <text class="sub" x="410" y="98" text-anchor="middle">4×64-bit structural code</text>

  <rect class="box" x="510" y="60" width="190" height="54" rx="6"/>
  <text class="label" x="605" y="82" text-anchor="middle">Fingerprint algebra</text>
  <text class="sub" x="605" y="98" text-anchor="middle">Hamming · Bitwise · OR · CountVector</text>

  <line class="flow" x1="170" y1="87" x2="198" y2="87"/>
  <line class="flow" x1="310" y1="87" x2="338" y2="87"/>
  <line class="flow" x1="480" y1="87" x2="508" y2="87"/>

  <!-- Row 2: row shape + coordinates -->
  <rect class="box" x="20" y="190" width="140" height="54" rx="6"/>
  <text class="label" x="90" y="212" text-anchor="middle">LatticeAnchor</text>
  <text class="sub" x="90" y="228" text-anchor="middle">topic coordinate</text>

  <rect class="box" x="200" y="190" width="110" height="54" rx="6"/>
  <text class="label" x="255" y="212" text-anchor="middle">Row</text>
  <text class="sub" x="255" y="228" text-anchor="middle">the substrate unit</text>

  <rect class="box" x="340" y="190" width="170" height="54" rx="6"/>
  <text class="label" x="425" y="212" text-anchor="middle">Row lifecycle + layout</text>
  <text class="sub" x="425" y="228" text-anchor="middle">NounType · RowState · RowBitmaps</text>

  <rect class="box" x="540" y="190" width="180" height="54" rx="6"/>
  <text class="label" x="630" y="212" text-anchor="middle">Temporal coordinates</text>
  <text class="sub" x="630" y="228" text-anchor="middle">HLC · TimeRange · AsOfCoordinate</text>

  <!-- Fingerprint feeds into Row; LatticeAnchor and lifecycle box compose with Row -->
  <line class="flow" x1="400" y1="114" x2="270" y2="188"/>
  <text class="sub" x="330" y="150">row.fingerprint</text>

  <line class="flow" x1="160" y1="217" x2="198" y2="217"/>
  <text class="sub" x="163" y="210">row.latticeAnchor</text>

  <line class="flow" x1="310" y1="217" x2="338" y2="217"/>
  <text class="sub" x="313" y="210">row.state / .bitmaps</text>

  <!-- Estate-level derived views region -->
  <rect class="region" x="10" y="320" width="730" height="110"/>
  <text class="regionlabel" x="20" y="338">Estate-level views (derived from many rows, not stored on one row)</text>

  <rect class="box" x="20" y="350" width="170" height="54" rx="6"/>
  <text class="label" x="105" y="372" text-anchor="middle">Population matrices</text>
  <text class="sub" x="105" y="388" text-anchor="middle">MatrixF · MatrixC · MatrixO · MatrixT</text>

  <rect class="box" x="210" y="350" width="160" height="54" rx="6"/>
  <text class="label" x="290" y="372" text-anchor="middle">Audit trail (CRDT)</text>
  <text class="sub" x="290" y="388" text-anchor="middle">AuditEvent · GSetAuditLog</text>

  <rect class="box" x="390" y="350" width="170" height="54" rx="6"/>
  <text class="label" x="475" y="372" text-anchor="middle">Integrity hashes</text>
  <text class="sub" x="475" y="388" text-anchor="middle">ContentHash · MerkleRoot</text>

  <rect class="box" x="580" y="350" width="150" height="54" rx="6"/>
  <text class="label" x="655" y="372" text-anchor="middle">Recall vocabulary</text>
  <text class="sub" x="655" y="388" text-anchor="middle">RecallResult · RowProjection</text>

  <!-- Derived-from arrows (dashed, secondary) -->
  <line class="derive" x1="400" y1="244" x2="120" y2="348"/>
  <line class="derive" x1="255" y1="244" x2="280" y2="348"/>
  <line class="derive" x1="630" y1="244" x2="320" y2="348"/>
  <line class="derive" x1="270" y1="244" x2="460" y2="348"/>
  <line class="derive" x1="290" y1="244" x2="640" y2="348"/>

  <!-- Legend -->
  <line class="flow" x1="770" y1="240" x2="800" y2="240"/>
  <text class="sub" x="806" y="244">composes / produces</text>
  <line class="derive" x1="770" y1="260" x2="800" y2="260"/>
  <text class="sub" x="806" y="264">read by / derived from</text>
</svg>
