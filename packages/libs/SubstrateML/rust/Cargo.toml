[package]
name = "substrate-ml"
version = "1.0.0-skeleton"
edition = "2021"
rust-version = "1.75"
description = "Layer 3 of the SubstrateLib three-package split: learning + graph algorithms. See cookbook v1.0 §20 and HARNESS_REFERENCE §2.2-§2.3."
license = "MIT OR Apache-2.0"
publish = false

[lib]
name = "substrate_ml"
path = "src/lib.rs"

[dependencies]
substrate-types  = { path = "../../SubstrateTypes/rust" }
substrate-kernel = { path = "../../SubstrateKernel/rust" }
# intellectus-lib is the zero-dep telemetry leaf. Adding it here lets the
# five VizGraph algorithms emit community.assignment, centrality.score,
# nmf.factor, anomaly.flag, and edge.decayed_weight signals when monitoring
# is enabled.
# Authority: DECISION_LIFT_PACKAGE_SWIFT_RULE_2026-05-28.
# Layering: intellectus-lib has zero repo deps; substrate-ml is downstream.
# No cycle introduced.
intellectus-lib = { path = "../../IntellectusLib/rust" }
